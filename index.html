    <!-- Schema Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "DOC có miễn phí không?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hoàn toàn miễn phí! DOC được vận hành theo cơ chế BYOK (Bring Your Own Key) - bạn sử dụng chính mã API Key miễn phí tự tạo của mình để kết nối trực tiếp với Google Gemini AI, không lo giới hạn số lượng và hoàn toàn không mất phí trung gian."
          }
        },
        {
          "@type": "Question",
          "name": "Tài liệu tôi tải lên có bị lưu lại không?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tuyệt đối không. Ứng dụng chạy trực tiếp trên trình duyệt của bạn (Client-Side). Tài liệu được xử lý cục bộ và chuyển trực tiếp tới máy chủ bảo mật của Google thông qua kết nối HTTPS để xử lý rồi trả kết quả về. DOC không lưu trữ bất kỳ tài liệu hay văn bản nào của bạn."
          }
        },
        {
          "@type": "Question",
          "name": "OCR tiếng Việt có chính xác không?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nhờ sức mạnh của mô hình ngôn ngữ lớn Google Gemini AI tiên tiến nhất hiện nay, DOC có thể nhận diện chính xác tiếng Việt kể cả các bản scan mờ, chữ viết tay nghiêng hoặc tài liệu cũ. Ngoài ra, AI sẽ tự động phân tích ngữ cảnh để sửa các lỗi chính tả phổ biến của tiếng Việt một cách thông minh."
          }
        },
        {
          "@type": "Question",
          "name": "Có hỗ trợ xuất sang file Word được không?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Có. Bạn có thể xuất kết quả sang tệp văn bản (.txt) đã được chuẩn hóa, loại bỏ hoàn toàn các ký tự xuống dòng bừa bãi. Bạn chỉ cần copy-paste trực tiếp vào Microsoft Word, Google Docs hoặc Excel để chỉnh sửa ngay lập tức mà không phải định dạng lại."
          }
        },
        {
          "@type": "Question",
          "name": "Giới hạn dung lượng và số lượng trang tệp là bao nhiêu?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "DOC hỗ trợ tải lên nhiều hình ảnh cùng lúc (JPG, PNG) và tệp PDF dung lượng tối đa lên đến 100MB. Hệ thống có cơ chế phân tách các trang PDF tự động và sắp xếp hàng đợi xử lý song song, giúp bóc tách hàng trăm trang tài liệu cực kỳ nhanh chóng."
          }
        },
        {
          "@type": "Question",
          "name": "Làm thế nào để lấy Gemini API Key miễn phí?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Bạn chỉ cần truy cập Google AI Studio (aistudio.google.com), đăng nhập bằng tài khoản Google bất kỳ, click vào nút 'Get API Key' và tạo một khoá trong 10 giây. Bạn có thể click vào nút 'Xem cách hoạt động' ở góc trên để xem video hướng dẫn chi tiết."
          }
        }
      ]

  <body>
    <div id="root"></div>

    <!-- Video Modal -->
    <div id="video-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden">
      <div class="relative w-full max-w-3xl bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200/50 dark:border-slate-800/50 overflow-hidden mx-4 animate-in fade-in zoom-in-95 duration-200 animate-out fade-out zoom-out-95">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
          <h3 class="text-base font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
            <span>🎥 Hướng dẫn lấy Gemini API Key (30 giây)</span>
          </h3>
          <button onclick="window.closeVideoModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer">
            <span class="text-xl font-semibold leading-none">&times;</span>
          </button>
        </div>
        <!-- Body -->
        <div class="w-full aspect-video bg-black">
          <iframe 
            id="youtube-iframe"
            class="w-full h-full"
            src="https://www.youtube.com/embed/ag0bHshpQ4U?enablejsapi=1" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen>
          </iframe>
        </div>
      </div>
    </div>

    <!-- Modal Helper Script -->
    <script>
      window.openVideoModal = function() {
        const modal = document.getElementById('video-modal');
        if (modal) {
          modal.classList.remove('hidden');
        }
      };
      
      window.closeVideoModal = function() {
        const modal = document.getElementById('video-modal');
        if (modal) {
          modal.classList.add('hidden');
          const iframe = document.getElementById('youtube-iframe');
          if (iframe) {
            // Reset src to stop audio from playing in the background
            iframe.src = "https://www.youtube.com/embed/ag0bHshpQ4U?enablejsapi=1";
          }
        }
      };
      
      // Close when clicking outside
      document.addEventListener('DOMContentLoaded', () => {
        const modal = document.getElementById('video-modal');
        if (modal) {
          modal.addEventListener('click', (e) => {
            if (e.target === modal) {
              window.closeVideoModal();
            }
          });
        }
      });
    </script>

    <script type="module" src="/src/main.jsx"></script>
