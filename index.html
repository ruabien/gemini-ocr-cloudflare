            "text": "DOC được thiết kế chuyên biệt phục vụ các cán bộ nghiệp vụ và chuyên gia trong khối tư pháp Việt Nam, bao gồm: Kiểm sát viên, Thẩm phán, Luật sư, Điều tra viên và Chấp hành viên có nhu cầu số hóa, xử lý văn bản từ hồ sơ tài liệu nghiệp vụ nhanh chóng."

          }
        },

          "@type": "Question",
          "name": "Có dùng được cho hồ sơ tư pháp không?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Có. DOC tối ưu hóa sâu cho ngữ cảnh và thuật ngữ nghiệp vụ tư pháp tại Việt Nam (như bản án, quyết định tố tụng, biên bản hỏi cung, hợp đồng, đơn từ). Trí tuệ nhân tạo Gemini AI giúp tự động sửa lỗi chính tả và khôi phục các phần chữ bị mờ, mất nét do chất lượng quét tài liệu cũ kém."
          }
        },

          "@type": "Question",
          "name": "Có nên tải tài liệu mật lên không?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tuyệt đối KHÔNG. Mặc dù dữ liệu được truyền tải qua HTTPS mã hóa trực tiếp đến Gemini API và không lưu lại bất kỳ máy chủ nào của DOC, người dùng tuyệt đối không được tải lên hoặc xử lý các tài liệu thuộc danh mục bí mật nhà nước (tài liệu mật, tối mật, tuyệt mật) theo quy định của Luật Bảo vệ bí mật nhà nước hiện hành."
